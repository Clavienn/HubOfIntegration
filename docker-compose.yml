# docker-compose.yml
version: '3.8'

services:
  # Base de données MongoDB
  mongodb:
    image: mongo:7
    container_name: esb-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-esb_hub}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - esb-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Backend API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: esb-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/${MONGO_DB:-esb_hub}?authSource=admin
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - esb-network
    depends_on:
      mongodb:
        condition: service_healthy

  # Frontend Next.js
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: esb-client
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - esb-network
    depends_on:
      - api

volumes:
  mongodb_data:
    driver: local

networks:
  esb-network:
    driver: bridge