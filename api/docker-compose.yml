version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: hub-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
      MONGO_INITDB_DATABASE: hub-integration
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hub-network

  redis:
    image: redis:7.2-alpine
    container_name: hub-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hub-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hub-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://admin:secretpassword@mongodb:27017/hub-integration?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    networks:
      - hub-network
    volumes:
      - ./logs:/app/logs

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: hub-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:secretpassword@mongodb:27017/hub-integration?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      LOG_LEVEL: info
    depends_on:
      - mongodb
      - redis
    networks:
      - hub-network
    volumes:
      - ./logs:/app/logs

  mongo-express:
    image: mongo-express:latest
    container_name: hub-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: secretpassword
      ME_CONFIG_MONGODB_URL: mongodb://admin:secretpassword@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - hub-network
    profiles:
      - dev

networks:
  hub-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data: